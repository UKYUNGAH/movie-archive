<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- 기본 메타태그 -->
        <meta
            name="description"
            content="TMDB API를 활용한 영화/TV 아카이브 서비스. 인기 영화와 TV 프로그램의 트레일러, 줄거리, 제작진 정보를 제공합니다."
        />

        <!-- OG 태그 -->
        <meta property="og:type" content="website" />
        <meta property="og:title" content="Movie Archive" />
        <meta
            property="og:description"
            content="TMDB API를 활용한 영화/TV 아카이브 서비스. 인기 영화와 TV 프로그램의 트레일러, 줄거리, 제작진 정보를 제공합니다."
        />
        <meta property="og:url" content="https://movie-archive-ten.vercel.app/" />
        <meta property="og:image" content="https://movie-archive-ten.vercel.app/og-image.png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />

        <!-- 트위터 카드 -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Movie Archive" />
        <meta
            name="twitter:description"
            content="TMDB API를 활용한 영화/TV 아카이브 서비스. 인기 영화와 TV 프로그램의 트레일러, 줄거리, 제작진 정보를 제공합니다."
        />
        <meta name="twitter:image" content="https://movie-archive-ten.vercel.app/og-image.png" />

        <title>Movie Archive</title>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/app/main.jsx"></script>
    </body>
</html>
